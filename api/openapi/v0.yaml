          application/json:
            schema:
              $ref: "#/components/schemas/CustomFoodCreateRequest"
      responses:
        "201":
          description: Custom food created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomFood"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/tracking/custom-foods/{custom_food_id}:
    patch:
      tags: [me, tracking]
      summary: Update custom food
      operationId: updateTrackingCustomFood
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: custom_food_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomFoodUpdateRequest"
      responses:
        "200":
          description: Custom food updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomFood"
        "404":
          $ref: "#/components/responses/NotFound"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [me, tracking]
      summary: Tombstone custom food
      operationId: deleteTrackingCustomFood
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: custom_food_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Custom food tombstoned
        "404":
          $ref: "#/components/responses/NotFound"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/tracking/saved-meals:
    get:
      tags: [me, tracking]
      summary: List active saved meals
      operationId: listTrackingSavedMeals
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
      responses:
        "200":
          description: Saved meals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedMeal"
    post:
      tags: [me, tracking]
      summary: Create saved meal
      operationId: createTrackingSavedMeal
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedMealCreateRequest"
      responses:
        "201":
          description: Saved meal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedMeal"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/tracking/saved-meals/{saved_meal_id}:
    patch:
      tags: [me, tracking]
      summary: Update saved meal
      operationId: updateTrackingSavedMeal
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: saved_meal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedMealUpdateRequest"
      responses:
        "200":
          description: Saved meal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedMeal"
        "404":
          $ref: "#/components/responses/NotFound"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [me, tracking]
      summary: Tombstone saved meal
      operationId: deleteTrackingSavedMeal
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: saved_meal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Saved meal tombstoned
        "404":
          $ref: "#/components/responses/NotFound"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/sync/mutations:
    post:
      tags: [sync]
      summary: Push offline mutation envelope(s) (compatibility-only legacy API)
      deprecated: true
      description: >
        Compatibility-only endpoint retained for legacy clients.
        New implementations must call `/v0/sync/mutations:batch` with
        signed envelopes and replay-window enforcement.
      operationId: postSyncMutations
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - $ref: "#/components/parameters/SyncDeviceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncMutationRequest"
      responses:
        "200":
          description: Mutation ingest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncMutationResponse"
        "401":
          description: Signature verification or key missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Version conflict detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: Sync disabled due consent/revocation state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/sync/mutations:batch:
    post:
      tags: [sync]
      summary: Push signed mutation batch with deterministic conflict codes
      operationId: postSyncMutationsBatch
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncV1MutationBatchRequest"
      responses:
        "200":
          description: Mutation batch ingest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncV1MutationBatchResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
  parameters:
    MeUserIdHeader:
      name: X-User-Id
      in: header
      required: true
      description: Account or user identifier.
      schema:
        type: string
        format: uuid
    MeDeviceIdHeader:
      name: X-Device-Id
      in: header
      required: false
      description: Opaque device identifier required for signing lookup.
      schema:
        type: string
    MeActorIdHeader:
      name: X-Actor-Id
      in: header
      required: false
      description: Actor UUID when changes are performed by support automation.
      schema:
        type: string
        format: uuid
    SyncDeviceIdHeader:
      name: X-Device-Id
      in: header
      required: true
      schema:
        type: string
    FoodSlugPath:
      name: food_slug
      in: path
      required: true
      description: Stable unique food slug (`foods.food_slug`).
      schema:
        type: string
        minLength: 1
        maxLength: 160
    FoodSearchQuery:
      name: q
      in: query
      required: true
      description: Case-insensitive food search string.
      schema:
        type: string
        minLength: 1
        maxLength: 160
    FoodSearchLimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of food results.
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
    FromSlugQuery:
      name: from
      in: query
      required: true
      description: Source food slug.
      schema:
        type: string
        minLength: 1
        maxLength: 160
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 10
    MinSafetyScoreQuery:
      name: min_safety_score
      in: query
      required: false
      description: Lower bound for `fodmap_safety_score`.
      schema:
        type: number
        minimum: 0
        maximum: 1
        default: 0

