openapi: 3.1.0
info:
  title: Fodmapp API (v0)
  version: 0.1.0
  summary: SQL-backed read API for food rollups, traits, and active swaps.
  description: |
    Canonical v0 read contract implemented by the FastAPI service.

    v0 contracts:
    - Public identity is `food_slug` (priority rank remains internal/debug only).
    - Responses include both FR/EN fields (no locale negotiation in v0).
    - Swap results include only active rules.
    - Rollup, subtype, and swap reads come from published current views.

    Data freshness note:
    Phase 3 compute still rebuilds internal snapshot artifacts, then the publish
    step materializes immutable `publish_id` rows and flips the `api_*_current`
    views atomically. Consumers should inspect `/v0/health` publish metadata plus
    `rollup_computed_at` and `source_slug` to evaluate freshness.
servers:
  - url: https://api.fodmapp.local
    description: Placeholder

tags:
  - name: health
  - name: foods
  - name: safe-harbors
  - name: swaps
  - name: me
  - name: sync

paths:
  /v0/health:
    get:
      tags: [health]
      summary: Liveness and publish metadata probe
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/foods:
    get:
      tags: [foods]
      summary: Search foods by slug or canonical names
      operationId: searchFoods
      parameters:
        - $ref: "#/components/parameters/FoodSearchQuery"
        - $ref: "#/components/parameters/FoodSearchLimitQuery"
      responses:
        "200":
          description: Food search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodSearchResponse"

  /v0/foods/{food_slug}:
    get:
      tags: [foods]
      summary: Food metadata by slug
      operationId: getFoodBySlug
      parameters:
        - $ref: "#/components/parameters/FoodSlugPath"
      responses:
        "200":
          description: Food found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v0/foods/{food_slug}/rollup:
    get:
      tags: [foods]
      summary: Current published 6-subtype rollup by food slug
      operationId: getFoodRollupBySlug
      description: |
        Returns the current published rollup projection for the active `publish_id`.
        Includes coverage and provenance fields.
      parameters:
        - $ref: "#/components/parameters/FoodSlugPath"
      responses:
        "200":
          description: Rollup found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodRollupResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v0/foods/{food_slug}/subtypes:
    get:
      tags: [foods]
      summary: Per-subtype levels and thresholds for a food
      operationId: getFoodSubtypesBySlug
      parameters:
        - $ref: "#/components/parameters/FoodSlugPath"
      responses:
        "200":
          description: Subtype-level breakdown found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodSubtypeListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v0/foods/{food_slug}/traits:
    get:
      tags: [foods]
      summary: Culinary trait profile for a food
      operationId: getFoodTraitsBySlug
      parameters:
        - $ref: "#/components/parameters/FoodSlugPath"
      responses:
        "200":
          description: Traits found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodTraitsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v0/safe-harbors:
    get:
      tags: [safe-harbors]
      summary: Discover Safe-Harbor V1 foods grouped by cohort
      operationId: listSafeHarbors
      description: |
        Returns Safe-Harbor V1 cohort groupings derived only from explicit 6/6
        zero-measurement packs materialized from CIQUAL-linked foods and
        internal rules. This endpoint is additive to `/v0/foods` search and
        does not imply full Phase 3 rollup coverage for the returned foods.

        Public copy and metadata are project-authored. Cohort assignment is
        limited to composition-compatible, plain-form items in approved V1
        cohorts only.
      responses:
        "200":
          description: Safe-harbor groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeHarborResponse"

  /v0/swaps:
    get:
      tags: [swaps]
      summary: Active swap recommendations for a source food
      operationId: listSwaps
      description: |
        Filters:
        - active rules only
        - `from` slug is required
        - optional score floor (`min_safety_score`)

        Sort order (deterministic):
        1) `fodmap_safety_score` DESC
        2) `overall_score` DESC
        3) `to_overall_level` ASC severity (`none`, `low`, `moderate`, `high`, `unknown`)
        4) `coverage_ratio` DESC
        5) `to_food_slug` ASC
      parameters:
        - $ref: "#/components/parameters/FromSlugQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/MinSafetyScoreQuery"
      responses:
        "200":
          description: Swap results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwapListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v0/me/consent:
    get:
      tags: [me]
      summary: Get latest consent record with history
      operationId: getMeConsent
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
      responses:
        "200":
          description: Consent state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentGetResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [me]
      summary: Grant, update, or revoke consent
      operationId: postMeConsent
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - $ref: "#/components/parameters/MeDeviceIdHeader"
        - $ref: "#/components/parameters/MeActorIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentPostRequest"
      responses:
        "200":
          description: Consent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentPostResponse"
        "400":
          description: Invalid payload or missing required request field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Consent update conflicts with delete hold or signature mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v0/me/export:
    post:
      tags: [me]
      summary: Request data export package
      operationId: requestMeExport
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportRequest"
      responses:
        "202":
          description: Accepted for async export processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportAcceptedResponse"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Request is rejected due consent or legal restriction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/export/{export_id}:
    get:
      tags: [me]
      summary: Poll export status
      operationId: getMeExport
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: export_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Export status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportPollResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: Export no longer available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/delete:
    post:
      tags: [me]
      summary: Request data delete/purge
      operationId: requestMeDelete
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteRequest"
      responses:
        "202":
          description: Accepted for async purge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAcceptedResponse"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Delete request conflicts with active deletion or invalid confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/delete/{delete_request_id}:
    get:
      tags: [me]
      summary: Poll delete status
      operationId: getMeDelete
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: delete_request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Delete status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePollResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: Delete request expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/tracking/feed:
    get:
      tags: [me, tracking]
      summary: Get mixed meal and symptom history feed
      operationId: getTrackingFeed
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Tracking feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingFeedResponse"

  /v0/me/tracking/summary/weekly:
    get:
      tags: [me, tracking]
      summary: Get descriptive weekly tracking summary
      operationId: getWeeklyTrackingSummary
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: anchor_date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Weekly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyTrackingSummaryResponse"

  /v0/me/tracking/symptoms:
    get:
      tags: [me, tracking]
      summary: List active symptom logs
      operationId: listTrackingSymptoms
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
      responses:
        "200":
          description: Symptom logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SymptomLog"
    post:
      tags: [me, tracking]
      summary: Create symptom log
      operationId: createTrackingSymptom
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SymptomLogCreateRequest"
      responses:
        "201":
          description: Symptom log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymptomLog"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/tracking/symptoms/{symptom_log_id}:
    patch:
      tags: [me, tracking]
      summary: Update symptom log
      operationId: updateTrackingSymptom
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: symptom_log_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SymptomLogUpdateRequest"
      responses:
        "200":
          description: Symptom log updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymptomLog"
        "404":
          $ref: "#/components/responses/NotFound"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [me, tracking]
      summary: Tombstone symptom log
      operationId: deleteTrackingSymptom
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: symptom_log_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Symptom log tombstoned
        "404":
          $ref: "#/components/responses/NotFound"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/tracking/meals:
    get:
      tags: [me, tracking]
      summary: List active meal logs
      operationId: listTrackingMeals
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
      responses:
        "200":
          description: Meal logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealLog"
    post:
      tags: [me, tracking]
      summary: Create meal log
      operationId: createTrackingMeal
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealLogCreateRequest"
      responses:
        "201":
          description: Meal log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLog"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/tracking/meals/{meal_log_id}:
    patch:
      tags: [me, tracking]
      summary: Update meal log
      operationId: updateTrackingMeal
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: meal_log_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealLogUpdateRequest"
      responses:
        "200":
          description: Meal log updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLog"
        "404":
          $ref: "#/components/responses/NotFound"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [me, tracking]
      summary: Tombstone meal log
      operationId: deleteTrackingMeal
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
        - name: meal_log_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Meal log tombstoned
        "404":
          $ref: "#/components/responses/NotFound"
        "423":
          description: Write blocked by consent scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v0/me/tracking/custom-foods:
    get:
      tags: [me, tracking]
      summary: List active custom foods
      operationId: listTrackingCustomFoods
      security:
        - HTTPBearer: []
      parameters:
        - $ref: "#/components/parameters/MeUserIdHeader"
      responses:
        "200":
          description: Custom foods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomFood"
    post:
      tags: [me, tracking]
      summary: Create custom food
      operationId: createTrackingCustomFood
      security:
        - HTTPBearer: []
      parameters:
