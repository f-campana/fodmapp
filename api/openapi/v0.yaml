          type: integer

    TrackingSeveritySummary:
      type: object
      properties:
        average:
          type: number
          nullable: true
        maximum:
          type: integer
          nullable: true

    ProximityMeal:
      type: object
      required:
        [meal_log_id, occurred_at_utc, hours_before_symptom, item_labels]
      properties:
        meal_log_id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        occurred_at_utc:
          type: string
          format: date-time
        hours_before_symptom:
          type: number
        item_labels:
          type: array
          items:
            type: string

    SymptomProximityGroup:
      type: object
      required:
        [symptom_log_id, symptom_type, severity, noted_at_utc, nearby_meals]
      properties:
        symptom_log_id:
          type: string
          format: uuid
        symptom_type:
          $ref: "#/components/schemas/SymptomType"
        severity:
          type: integer
          minimum: 0
          maximum: 10
        noted_at_utc:
          type: string
          format: date-time
        nearby_meals:
          type: array
          items:
            $ref: "#/components/schemas/ProximityMeal"

    WeeklyTrackingSummaryResponse:
      type: object
      required:
        [
          anchor_date,
          window_start_utc,
          window_end_utc,
          daily_counts,
          symptom_counts,
          severity,
          proximity_groups,
        ]
      properties:
        anchor_date:
          type: string
          format: date
        window_start_utc:
          type: string
          format: date-time
        window_end_utc:
          type: string
          format: date-time
        daily_counts:
          type: array
          items:
            $ref: "#/components/schemas/DailyTrackingCount"
        symptom_counts:
          type: array
          items:
            $ref: "#/components/schemas/SymptomTypeCount"
        severity:
          $ref: "#/components/schemas/TrackingSeveritySummary"
        proximity_groups:
          type: array
          items:
            $ref: "#/components/schemas/SymptomProximityGroup"

    Receipt:
      type: object
      required: [receipt_id, issued_at_utc, actor, manifest_hash]
      properties:
        receipt_id:
          type: string
          format: uuid
        issued_at_utc:
          type: string
          format: date-time
        actor:
          type: string
        policy_version:
          type: string
          nullable: true
        manifest_hash:
          type: string
        proof_signature:
          type: string
          nullable: true

    ExportRequest:
      type: object
      required: [format]
      properties:
        format:
          type: string
          enum: [json, ndjson]
        from_ts_utc:
          type: string
          format: date-time
          nullable: true
        to_ts_utc:
          type: string
          format: date-time
          nullable: true
        include:
          type: array
          items:
            type: string
        anonymize:
          type: boolean
          default: true
        idempotency_key:
          type: string
          nullable: true

    ExportAcceptedResponse:
      type: object
      required: [export_id, status, requested_at_utc, expiry_at_utc, status_uri]
      properties:
        export_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            [accepted, queued, processing, ready, ready_with_redactions, failed]
        requested_at_utc:
          type: string
          format: date-time
        expiry_at_utc:
          type: string
          format: date-time
        idempotency_key:
          type: string
          nullable: true
        status_uri:
          type: string

    ExportPollResponse:
      type: object
      required: [export_id, status, scope, rows_by_domain, redactions, manifest]
      properties:
        export_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
          nullable: true
        status:
          type: string
        completed_at_utc:
          type: string
          format: date-time
          nullable: true
        scope:
          type: object
          additionalProperties: true
        rows_by_domain:
          type: object
          additionalProperties:
            type: integer
        redactions:
          type: array
          items:
            type: string
        download_url:
          type: string
          nullable: true
        manifest:
          type: object
          additionalProperties: true
        proof:
          $ref: "#/components/schemas/Receipt"
          nullable: true
        failure:
          type: object
          additionalProperties:
            type: string
          nullable: true

    DeleteRequest:
      type: object
      required: [scope, confirm_text]
      properties:
        scope:
          type: string
          enum: [all, symptoms_only, diet_only, analytics_only]
        soft_delete_window_days:
          type: integer
          minimum: 0
        hard_delete:
          type: boolean
          default: true
        confirm_text:
          type: string
        reason:
          type: string
          nullable: true
        client_nonce:
          type: string
          nullable: true
        idempotency_key:
          type: string
          nullable: true

    DeleteSummary:
      type: object
      properties:
        consent_records_touched:
          type: integer
        symptom_logs_deleted:
          type: integer
        diet_logs_deleted:
          type: integer
        swap_history_deleted:
          type: integer
        queue_items_dropped:
          type: integer
        exports_invalidated:
          type: integer

    DeleteAcceptedResponse:
      type: object
      required:
        [
          delete_request_id,
          status,
          requested_at_utc,
          scope,
          local_effective_ttl_seconds,
          server_effective_at_utc,
          status_uri,
        ]
      properties:
        delete_request_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [accepted, queued, processing, completed, partial, failed]
        requested_at_utc:
          type: string
          format: date-time
        scope:
          type: string
          enum: [all, symptoms_only, diet_only, analytics_only]
        idempotency_key:
          type: string
          nullable: true
        local_effective_ttl_seconds:
          type: integer
        server_effective_at_utc:
          type: string
          format: date-time
        proof_uri:
          type: string
          nullable: true
        status_uri:
          type: string

    RetainedArtifact:
      type: object
      required: [type, reason, retention_until_utc]
      properties:
        type:
          type: string
        reason:
          type: string
        retention_until_utc:
          type: string
          format: date-time

    DeletePollResponse:
      type: object
      required: [delete_request_id, status, summary]
      properties:
        delete_request_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [accepted, queued, processing, completed, partial, failed]
        idempotency_key:
          type: string
          nullable: true
        completed_at_utc:
          type: string
          format: date-time
          nullable: true
        summary:
          $ref: "#/components/schemas/DeleteSummary"
        proof:
          $ref: "#/components/schemas/Receipt"
          nullable: true
        failure:
          type: object
          additionalProperties:
            type: string
          nullable: true
        retained_artifacts:
          type: array
          items:
            $ref: "#/components/schemas/RetainedArtifact"

    MutationEnvelope:
      type: object
      required:
        - queue_item_id
        - idempotency_key
        - device_id
        - app_install_id
        - op
        - entity_type
        - client_seq
        - ttl_seconds
        - created_at_utc
        - payload
        - signature
        - signature_kid
      properties:
        queue_item_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
        device_id:
          type: string
        app_install_id:
          type: string
        op:
          type: string
        entity_type:
          type: string
        entity_id:
          type: string
          nullable: true
        client_seq:
          type: integer
          minimum: 0
        base_version:
          type: integer
          nullable: true
        attempt:
          type: integer
        ttl_seconds:
          type: integer
          minimum: 1
        created_at_utc:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
        aad:
          type: object
          additionalProperties: true
        signature:
          type: string
        signature_kid:
          type: string
        signature_algorithm:
          type: string
          default: hmac-sha256
        ciphertext:
          type: string
          nullable: true
        nonce:
          type: string
          nullable: true
        tag:
          type: string
          nullable: true

    MutationResult:
      type: object
      required: [queue_item_id, idempotency_key, status, mutation_status]
      properties:
        queue_item_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
        status:
          type: string
          enum: [accepted, duplicate, conflict, replayed, rejected, error]
        mutation_status:
          type: string
        entity_version:
          type: integer
          nullable: true
        error_code:
          type: string
          nullable: true

    SyncMutationRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MutationEnvelope"

    SyncMutationResponse:
      type: object
      required: [processed, accepted, duplicates, results]
      properties:
        processed:
          type: integer
          minimum: 0
        accepted:
          type: integer
          minimum: 0
        duplicates:
          type: integer
          minimum: 0
        results:
          type: array
          items:
            $ref: "#/components/schemas/MutationResult"

    SyncV1MutationSource:
      type: object
      required: [platform, screen, actor]
      properties:
        platform:
          type: string
          enum: [ios, android, web]
        screen:
          type: string
        actor:
          type: string
          enum: [user, background_replay, system]
        app_build:
          type: string
          nullable: true

    SyncV1MutationIntegrity:
      type: object
      required: [payload_hash, signature, signature_version]
      properties:
        payload_hash:
          type: string
          minLength: 8
        chain_prev_hash:
          type: string
          nullable: true
        signature_algo:
          type: string
          enum: [hmac-sha256]
          default: hmac-sha256
        signature:
          type: string
          minLength: 8
        signature_version:
          type: integer
          minimum: 1

    SyncV1MutationRecovery:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            [SHOW_REPLACEMENT, KEEP_REMOTE, MANUAL_RETRY, OPEN_SETTINGS, NONE]
        replacement_rule_id:
          type: string
          nullable: true
        note:
          type: string
          nullable: true

    SyncV1MutationConflict:
      type: object
      required:
        [code, message_key, retryable, is_resolvable_client_side, recovery]
      properties:
        code:
          type: string
          enum:
            [
              RULE_INACTIVE,
              RULE_SCORE_BELOW_THRESHOLD,
              ENDPOINT_UNKNOWN,
              RANK2_BLOCKED,
              VERSION_CONFLICT,
              CONSENT_REVOKED,
              ACCOUNT_DELETED,
            ]
        message_key:
          type: string
        retryable:
          type: boolean
          default: false
        is_resolvable_client_side:
          type: boolean
          default: false
        recovery:
          $ref: "#/components/schemas/SyncV1MutationRecovery"
        fodmap_safety_score_snapshot:
          type: number
          nullable: true
        scoring_version_snapshot:
          type: string
          nullable: true
        from_food_slug:
          type: string
          nullable: true
        to_food_slug:
          type: string
          nullable: true
        to_overall_level:
          $ref: "#/components/schemas/FoodLevel"
          nullable: true
        coverage_ratio:
          type: number
          nullable: true

    SyncV1MutationObservability:
      type: object
      required:
        [
          event_id,
          request_id,
          payload_hash,
          processing_ms,
          server_received_at_utc,
          retry_attempt,
        ]
      properties:
        event_id:
          type: string
        request_id:
          type: string
        payload_hash:
          type: string
        processing_ms:
          type: integer
          minimum: 0
        signature_valid:
          type: boolean
          default: false
        server_received_at_utc:
          type: string
          format: date-time
        dedupe_hit:
          type: boolean
          default: false
        retry_attempt:
          type: integer
          minimum: 0
          default: 0

    SyncV1MutationItem:
      type: object
      required:
        - mutation_id
        - idempotency_key
        - operation_type
        - client_seq
        - client_created_at
        - payload
        - integrity
      properties:
        mutation_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
        operation_type:
          type: string
          enum:
            [
              SYMPTOM_CREATE,
              SYMPTOM_UPDATE,
              SYMPTOM_DELETE,
              MEAL_CREATE,
              MEAL_UPDATE,
              MEAL_DELETE,
              CUSTOM_FOOD_CREATE,
              CUSTOM_FOOD_UPDATE,
              CUSTOM_FOOD_DELETE,
              SAVED_MEAL_CREATE,
              SAVED_MEAL_UPDATE,
              SAVED_MEAL_DELETE,
              PREF_SET,
              PREF_DELETE,
              SWAP_APPLY,
              SWAP_REVERT,
              WITHDRAW_CONSENT,
              DELETE_ACCOUNT,
            ]
        entity_type:
          type: string
          nullable: true
        entity_id:
          type: string
          nullable: true
        base_version:
          type: integer
          nullable: true
        client_seq:
          type: integer
          minimum: 0
        client_created_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
        depends_on_mutation_id:
          type: string
          format: uuid
          nullable: true
        source:
          $ref: "#/components/schemas/SyncV1MutationSource"
        conflict_marker:
          type: object
          additionalProperties: true
          nullable: true
        integrity:
          $ref: "#/components/schemas/SyncV1MutationIntegrity"
        # Legacy migration fields
        mutation_id_legacy:
          type: string
        operation_legacy:
          type: string
          enum:
            [
              SYMPTOM_CREATE,
              SYMPTOM_UPDATE,
              SYMPTOM_DELETE,
              MEAL_CREATE,
              MEAL_UPDATE,
              MEAL_DELETE,
              CUSTOM_FOOD_CREATE,
              CUSTOM_FOOD_UPDATE,
              CUSTOM_FOOD_DELETE,
              SAVED_MEAL_CREATE,
              SAVED_MEAL_UPDATE,
              SAVED_MEAL_DELETE,
              PREF_SET,
              PREF_DELETE,
              SWAP_APPLY,
              SWAP_REVERT,
              WITHDRAW_CONSENT,
              DELETE_ACCOUNT,
            ]
        legacy_source:
          type: object
          additionalProperties: true

    SyncV1MutationResult:
      type: object
      required:
        [
          mutation_id,
          idempotency_key,
          status,
          result_code,
          observability,
          server_received_at_utc,
        ]
      properties:
        mutation_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
        status:
          type: string
          enum:
            [
              APPLIED,
              DUPLICATE,
              CONFLICT,
              RETRY_WAIT,
              FAILED_PERMANENT,
              CANCELLED_BY_CONSENT,
              CANCELLED_BY_DELETE,
            ]
        result_code:
          type: string
          enum:
            [
              OK,
              DUPLICATE,
              RULE_INACTIVE,
              RULE_SCORE_BELOW_THRESHOLD,
              ENDPOINT_UNKNOWN,
              RANK2_BLOCKED,
              VERSION_CONFLICT,
              CONSENT_REVOKED,
              ACCOUNT_DELETED,
              INVALID_PAYLOAD,
              INTERNAL_ERROR,
            ]
        retry_after_ms:
          type: integer
          minimum: 0
        attempted:
          type: boolean
          default: true
        applied_version:
          type: integer
          nullable: true
        conflict:
          $ref: "#/components/schemas/SyncV1MutationConflict"
          nullable: true
        observability:
          $ref: "#/components/schemas/SyncV1MutationObservability"
        server_received_at_utc:
          type: string
          format: date-time

    SyncV1MutationBatchRequest:
      type: object
      required:
        [
          schema_version,
          batch_id,
          client_device_id,
          sync_session_id,
          client_time_utc,
          items,
        ]
      properties:
        schema_version:
          type: integer
          minimum: 1
          maximum: 1
          default: 1
        batch_id:
          type: string
        client_device_id:
          type: string
        sync_session_id:
          type: string
        client_time_utc:
          type: string
          format: date-time
        user_id:
          type: string
          format: uuid
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SyncV1MutationItem"
        migration_mode:
          type: boolean
          default: false

    SyncV1MutationBatchResponse:
      type: object
      required:
        [batch_id, schema_version, received_at_utc, server_batch_seq, items]
      properties:
        batch_id:
          type: string
        schema_version:
          type: integer
          minimum: 1
          maximum: 1
        received_at_utc:
          type: string
          format: date-time
        server_batch_seq:
          type: integer
          minimum: 1
        items:
          type: array
          items:
            $ref: "#/components/schemas/SyncV1MutationResult"
