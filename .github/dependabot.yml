version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 6
    groups:
      ci-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 6
    groups:
      storybook-tooling:
        patterns:
          - "@storybook/*"
          - "storybook"
          - "chromatic"
      mobile-runtime:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react-native"
          - "react-native-*"
          - "@react-native/*"
          - "@react-navigation/*"
      build-tooling:
        patterns:
          - "turbo"
          - "@turbo/*"
          - "vite"
          - "vite-*"
          - "@vitejs/*"
          - "typescript"
          - "tsx"
          - "rollup"
          - "rollup-*"
          - "webpack"
          - "webpack-*"
          - "esbuild"
          - "postcss"
          - "autoprefixer"
          - "tailwindcss"
          - "@tailwindcss/*"
      auth-runtime:
        patterns:
          - "next-auth"
          - "@auth/*"
          - "jose"
          - "openid-client"
    ignore:
      - dependency-name: "eslint-import-resolver-typescript"
        update-types:
          - "version-update:semver-major"
