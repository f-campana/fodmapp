name: setup-js-workspace
description: Checkout repository, configure pnpm/node, and optionally restore Turborepo cache artifacts.
inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "22"
  pnpm-version:
    description: pnpm version managed by pnpm/action-setup.
    required: false
    default: "10.29.3"
  checkout-depth:
    description: Git checkout fetch-depth.
    required: false
    default: "1"
  skip-checkout:
    description: Skip repository checkout when workflow already handled it.
    required: false
    default: "false"
  install-command:
    description: Dependency install command. Set to empty to skip.
    required: false
    default: "pnpm install --frozen-lockfile"
  enable-node-cache:
    description: Whether to enable setup-node pnpm cache integration.
    required: false
    default: "true"
  enable-turbo-cache:
    description: Whether to evaluate Turborepo remote/local cache availability.
    required: false
    default: "true"
  turbo-team:
    description: TURBO_TEAM secret or empty string.
    required: false
    default: ""
  turbo-token:
    description: TURBO_TOKEN secret or empty string.
    required: false
    default: ""
  turbo-cache-path:
    description: Path used for local Turborepo cache fallback.
    required: false
    default: ".turbo"
  turbo-cache-key:
    description: Cache key for actions/cache restore.
    required: false
    default: ""
  turbo-cache-restore-keys:
    description: Newline-separated restore keys for cache fallback.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6
      if: ${{ inputs.skip-checkout != 'true' }}
      with:
        fetch-depth: ${{ inputs.checkout-depth }}

    - name: Setup pnpm
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node (pnpm cache enabled)
      if: ${{ inputs.enable-node-cache == 'true' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"

    - name: Setup Node (cache disabled)
      if: ${{ inputs.enable-node-cache != 'true' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install workspace dependencies
      if: ${{ inputs.install-command != '' }}
      run: ${{ inputs.install-command }}
      shell: bash

    - name: Determine turbo cache mode
      id: turbo-cache
      shell: bash
      run: |
        if [[ "${{ inputs.enable-turbo-cache }}" != "true" ]]; then
          echo "use_remote=false" >> "$GITHUB_OUTPUT"
          echo "Turbo local cache mode explicitly disabled."
          exit 0
        fi

        if [[ -n "${{ inputs.turbo-team }}" && -n "${{ inputs.turbo-token }}" ]]; then
          echo "use_remote=true" >> "$GITHUB_OUTPUT"
          echo "TURBO_TEAM=${{ inputs.turbo-team }}" >> "$GITHUB_ENV"
          echo "TURBO_TOKEN=${{ inputs.turbo-token }}" >> "$GITHUB_ENV"
          echo "Turbo remote cache configured."
        else
          echo "use_remote=false" >> "$GITHUB_OUTPUT"
          echo "Turbo remote cache unavailable. Falling back to .turbo cache."
        fi

    - name: Restore Turborepo local cache fallback
      if: steps.turbo-cache.outputs.use_remote != 'true' && inputs.enable-turbo-cache == 'true' && inputs.turbo-cache-key != ''
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.turbo-cache-path }}
        key: ${{ inputs.turbo-cache-key }}
        restore-keys: ${{ inputs.turbo-cache-restore-keys }}

outputs:
  use_remote:
    description: Whether remote Turborepo cache should be used.
    value: ${{ steps.turbo-cache.outputs.use_remote }}
