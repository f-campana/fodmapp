name: API

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  api-tests:
    name: api-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fodmap_api_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fodmap_api_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      API_DB_URL: postgresql://postgres:postgres@localhost:5432/fodmap_api_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./api[dev]

      - name: Run API contract/unit tests
        run: |
          pytest -m "not integration" api/tests
