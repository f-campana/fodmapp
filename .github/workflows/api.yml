name: API

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  api-tests:
    name: api-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fodmapp_api_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fodmapp_api_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      API_DB_URL: postgresql://postgres:postgres@localhost:5432/fodmapp_api_ci?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install API dependencies
        run: |
          cd api
          uv sync --extra dev --locked

      - name: Run API contract/unit tests
        run: |
          uv run --project api pytest -m "not integration" api/tests

  dbmate-smoke:
    name: dbmate-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fodmapp_dbmate_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fodmapp_dbmate_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      API_DB_URL: postgresql://postgres:postgres@localhost:5432/fodmapp_dbmate_ci?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-js-workspace
        with:
          node-version: "22"
          pnpm-version: "10.29.3"
          install-command: "pnpm install --frozen-lockfile"
          enable-turbo-cache: "false"

      - name: Install system PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Run dbmate migrate
        run: |
          pnpm db:migrate

      - name: Verify dbmate baseline objects via psql
        run: |
          foods_table="$(psql "$API_DB_URL" -tA -c "SELECT to_regclass('public.foods');")"
          test "$foods_table" = "foods"

          cohort_table="$(psql "$API_DB_URL" -tA -c "SELECT to_regclass('public.safe_harbor_cohorts');")"
          test "$cohort_table" = "safe_harbor_cohorts"

          consent_table="$(psql "$API_DB_URL" -tA -c "SELECT to_regclass('public.user_consent_ledger');")"
          test "$consent_table" = "user_consent_ledger"

          tracking_table="$(psql "$API_DB_URL" -tA -c "SELECT to_regclass('public.symptom_logs');")"
          test "$tracking_table" = "symptom_logs"

          auth_table="$(psql "$API_DB_URL" -tA -c "SELECT to_regclass('public.me_auth_identities');")"
          test "$auth_table" = "me_auth_identities"

          publish_releases_table="$(psql "$API_DB_URL" -tA -c "SELECT to_regclass('public.publish_releases');")"
          test "$publish_releases_table" = "publish_releases"

          published_rollups_table="$(psql "$API_DB_URL" -tA -c "SELECT to_regclass('public.published_food_rollups');")"
          test "$published_rollups_table" = "published_food_rollups"

          publish_meta_view="$(psql "$API_DB_URL" -tA -c "SELECT to_regclass('public.api_publish_meta_current');")"
          test "$publish_meta_view" = "api_publish_meta_current"

          baseline_count="$(psql "$API_DB_URL" -tA -c "SELECT COUNT(*) FROM schema_migrations WHERE version = '20260321000000';")"
          test "$baseline_count" = "1"

          publish_migration_count="$(psql "$API_DB_URL" -tA -c "SELECT COUNT(*) FROM schema_migrations WHERE version = '20260321143000';")"
          test "$publish_migration_count" = "1"

      - name: Verify dbmate status is clean
        run: |
          status_output="$(pnpm db:status)"
          echo "$status_output"
          echo "$status_output" | grep -Eq '^Pending: 0$'

      - name: Verify checked-in schema dump stays in sync
        run: |
          git diff --exit-code -- schema/dbmate/schema.sql

  api-integration-seeded:
    name: api-integration-seeded
    needs:
      - api-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fodmapp_api_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fodmapp_api_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      API_DB_URL: postgresql://postgres:postgres@localhost:5432/fodmapp_api_ci?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install system PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Install dependencies for seed + API tests
        run: |
          cd api
          uv sync --extra dev --extra ci --locked

      - name: Cache CIQUAL data
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/ciqual-data
          key: ciqual-2025-5555c572-e0b1de25-e216928b

      - name: Fetch CIQUAL files (pinned + checksum-verified)
        run: |
          while IFS= read -r line; do
            case "$line" in
              CIQUAL_XLSX=*|CIQUAL_ALIM_XML=*|CIQUAL_GRP_XML=*)
                echo "$line" >> "$GITHUB_ENV"
                ;;
            esac
          done < <(./etl/ciqual/fetch_ciqual_data.sh "$RUNNER_TEMP/ciqual-data")

      - name: Validate replay script syntax
        run: |
          bash -n etl/phase2/scripts/phase2_replay_from_zero.sh

      - name: Seed Phase2 via full replay
        env:
          REPLAY_DB: fodmapp_api_ci
          ADMIN_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres
          REPLAY_DB_URL: postgresql://postgres:postgres@localhost:5432/fodmapp_api_ci
          PGUSER: postgres
          PGHOST: localhost
          PGPORT: 5432
          PSQL_BIN: psql
        run: |
          uv run --project api bash etl/phase2/scripts/phase2_replay_from_zero.sh

      - name: Seed Phase3 product layer
        env:
          SEED_DB_URL: postgresql://postgres:postgres@localhost:5432/fodmapp_api_ci
          PSQL_BIN: psql
        run: |
          uv run --project api bash etl/phase3/scripts/phase3_seed_for_api_ci.sh

      - name: Sanity assert seeded state via psql
        run: |
          publish_id="$(psql "$API_DB_URL" -tA -c "SELECT publish_id FROM api_publish_meta_current;")"
          test -n "$publish_id"

          rollup_count="$(psql "$API_DB_URL" -tA -c "SELECT COUNT(*) FROM api_food_rollups_current;")"
          test "$rollup_count" = "42"

          subtype_count="$(psql "$API_DB_URL" -tA -c "SELECT COUNT(*) FROM api_food_subtypes_current;")"
          test "$subtype_count" != "0"

          active_count="$(psql "$API_DB_URL" -tA -c "SELECT COUNT(*) FROM swap_rules r JOIN sources s ON s.source_id = r.source_id WHERE s.source_slug = 'internal_rules_v1' AND r.notes = 'phase3_mvp_rule' AND r.status = 'active';")"
          test "$active_count" = "11"

          active_publishable_swap_count="$(psql "$API_DB_URL" -tA -c "WITH active_rules AS (SELECT r.swap_rule_id, p_from.priority_rank AS from_priority_rank, p_to.priority_rank AS to_priority_rank, vrt.driver_subtype_code AS driver_subtype FROM swap_rules r LEFT JOIN phase2_priority_foods p_from ON p_from.resolved_food_id = r.from_food_id LEFT JOIN phase2_priority_foods p_to ON p_to.resolved_food_id = r.to_food_id LEFT JOIN v_phase3_rollups_latest_full vrt ON vrt.food_id = r.to_food_id WHERE r.status = 'active' AND COALESCE(p_from.priority_rank, 0) <> 2 AND COALESCE(p_to.priority_rank, 0) <> 2), with_burden AS (SELECT ar.swap_rule_id FROM active_rules ar LEFT JOIN v_phase3_rollup_subtype_levels_latest fd ON fd.priority_rank = ar.from_priority_rank AND fd.subtype_code = ar.driver_subtype LEFT JOIN v_phase3_rollup_subtype_levels_latest td ON td.priority_rank = ar.to_priority_rank AND td.subtype_code = ar.driver_subtype) SELECT COUNT(*) FROM with_burden;")"

          draft_count="$(psql "$API_DB_URL" -tA -c "SELECT COUNT(*) FROM swap_rules r JOIN sources s ON s.source_id = r.source_id WHERE s.source_slug = 'internal_rules_v1' AND r.notes = 'phase3_mvp_rule' AND r.status = 'draft';")"
          test "$draft_count" = "1"

          published_swap_count="$(psql "$API_DB_URL" -tA -c "SELECT COUNT(*) FROM api_swaps_current;")"
          test "$published_swap_count" = "$active_publishable_swap_count"

      - name: Run API integration tests
        run: |
          uv run --project api pytest -m integration api/tests

  api-gate:
    name: API
    if: ${{ always() }}
    needs:
      - api-tests
      - dbmate-smoke
      - api-integration-seeded
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate API workflow results
        run: |
          set -euo pipefail

          for result in "${{ needs.api-tests.result }}" "${{ needs.dbmate-smoke.result }}" "${{ needs.api-integration-seeded.result }}"; do
            if [ "$result" != "success" ]; then
              echo "::error::API gate failed because a dependency result was '$result'."
              exit 1
            fi
          done

          echo "API gate passed."
