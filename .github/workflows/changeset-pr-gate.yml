name: Changeset PR Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  ensure-changeset:
    name: Changeset PR Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect releasable scope changes
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          changed_files="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")"
          relevant="false"

          while IFS= read -r file; do
            case "$file" in
              apps/*|packages/*|package.json|pnpm-workspace.yaml|pnpm-lock.yaml|turbo.json|.changeset/*)
                relevant="true"
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"
          if [ "$relevant" = "true" ]; then
            echo "Changeset gate active: package/app or releasable root files changed."
          else
            echo "Changeset gate skipped: no package/app or releasable root changes detected."
          fi

      - name: Setup pnpm
        if: steps.scope.outputs.relevant == 'true'
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.29.3

      - name: Setup Node
        if: steps.scope.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        if: steps.scope.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate changeset coverage
        if: steps.scope.outputs.relevant == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          CHANGESET_EXEMPT_LABEL: changeset-exempt
          CHANGESET_EXEMPT_PACKAGES: "@fodmap/mobile-prototype"
        run: node .github/scripts/check-pr-changesets.mjs

      - name: Mark gate as satisfied for out-of-scope changes
        if: steps.scope.outputs.relevant != 'true'
        run: |
          echo "Changeset PR Gate passed: releasable paths were not touched."
