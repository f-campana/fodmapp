name: Changeset PR Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  ensure-changeset:
    name: Changeset PR Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect releasable scope changes
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node .github/scripts/detect-changeset-pr-scope.mjs

      - name: Setup workspace
        id: setup
        if: steps.scope.outputs.relevant == 'true'
        uses: ./.github/actions/setup-js-workspace
        with:
          node-version: "22"
          pnpm-version: 10.29.3
          skip-checkout: "true"
          install-command: "pnpm install --frozen-lockfile"
          enable-turbo-cache: "false"

      - name: Validate changeset coverage
        if: steps.scope.outputs.relevant == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          CHANGESET_EXEMPT_LABEL: changeset-exempt
          CHANGESET_EXEMPT_PACKAGES: "@fodmap/mobile-prototype"
        run: node .github/scripts/check-pr-changesets.mjs

      - name: Mark gate as satisfied for out-of-scope changes
        if: steps.scope.outputs.relevant != 'true'
        run: |
          echo "Changeset PR Gate passed: releasable paths were not touched."
