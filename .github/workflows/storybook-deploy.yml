name: Storybook Deploy

on:
  push:
    branches:
      - "main"
    paths:
      - "apps/storybook/**"
      - "packages/ui/**"
      - "packages/design-tokens/**"
      - "packages/tailwind-config/**"
      - "packages/reporting/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/storybook-deploy.yml"
      - ".github/actions/setup-js-workspace/action.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  storybook-production:
    name: storybook-production
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: vercel-production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-js-workspace
        with:
          node-version: "22"
          pnpm-version: "10.29.3"
          install-command: "pnpm install --frozen-lockfile"
          enable-turbo-cache: "false"

      - name: Validate required Vercel environment secrets
        run: |
          set -euo pipefail
          for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required environment secret: ${key}"
              exit 1
            fi
          done

      - name: Pull Vercel project settings (production)
        run: |
          pnpm dlx vercel@50.20.0 pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Storybook static output (production)
        run: |
          pnpm exec turbo run storybook:build --filter=@fodmapp/storybook

      - name: Prepare Vercel prebuilt output (production)
        run: |
          set -euo pipefail
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -R apps/storybook/storybook-static/. .vercel/output/static/
          cat > .vercel/output/config.json <<'EOF'
          {
            "version": 3
          }
          EOF

      - name: Deploy Storybook production
        id: deploy
        run: |
          set -euo pipefail

          deploy_log="$(mktemp)"
          if ! pnpm dlx vercel@50.20.0 deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tee "$deploy_log"; then
            echo "::error::Vercel production deploy command failed."
            exit 1
          fi

          deployment_url="$(
            tr -cs '[:graph:]' '\n' < "$deploy_log" \
              | grep -E '^https://[^[:space:]]+\.vercel\.app$' \
              | tail -n1 || true
          )"

          if [ -z "$deployment_url" ]; then
            echo "::error::Could not extract production deployment URL from Vercel output."
            cat "$deploy_log"
            exit 1
          fi

          echo "production_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        env:
          PRODUCTION_URL: ${{ steps.deploy.outputs.production_url }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          {
            echo "## Storybook Production Deployment"
            echo
            echo "- URL (canonical): https://ui.fodmapp.fr"
            echo "- URL (deployment): ${PRODUCTION_URL}"
            echo "- Commit: \`${COMMIT_SHA}\`"
            echo "- Access mode: Public."
          } >> "$GITHUB_STEP_SUMMARY"
