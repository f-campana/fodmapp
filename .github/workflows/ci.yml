name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run quality gate
        run: |
          ./.github/scripts/quality-gate.sh

  openapi-types:
    name: openapi-types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify OpenAPI generated types are up to date
        run: |
          pnpm openapi:check
