name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run quality gate
        run: |
          ./.github/scripts/quality-gate.sh

  openapi-types:
    name: openapi-types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify OpenAPI generated types are up to date
        run: |
          turbo run openapi:check --filter=@fodmap/types

  design-tokens:
    name: design-tokens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify generated token artifacts are up to date
        run: |
          turbo run tokens:check --filter=@fodmap/design-tokens

      - name: Build design token artifacts
        run: |
          turbo run build --filter=@fodmap/design-tokens

  ui-foundation:
    name: ui-foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify Tailwind shared style mapping is up to date
        run: |
          turbo run styles:check --filter=@fodmap/tailwind-config

      - name: Build and validate UI package
        run: |
          turbo run build typecheck test --filter=@fodmap/ui

      - name: Typecheck Storybook sources
        run: |
          turbo run typecheck --filter=@fodmap/storybook

      - name: Build Storybook
        run: |
          turbo run storybook:build --filter=@fodmap/storybook

      - name: Install Chromium for Storybook tests
        run: |
          pnpm --filter @fodmap/storybook exec playwright install chromium

      - name: Run Storybook interaction and a11y tests
        run: |
          turbo run storybook:test --filter=@fodmap/storybook

  app-scaffold:
    name: app-scaffold
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Test, build, and typecheck app scaffold
        run: |
          turbo run test typecheck build --filter=@fodmap/app

  content-scaffolds:
    name: content-scaffolds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build and typecheck marketing and research scaffolds
        run: |
          turbo run typecheck build --filter=@fodmap/marketing --filter=@fodmap/research
