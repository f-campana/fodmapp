name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run quality gate
        run: |
          ./.github/scripts/quality-gate.sh

  workspace-checks:
    name: workspace-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Run workspace typecheck
        run: |
          pnpm typecheck

      - name: Run workspace tests
        run: |
          pnpm test

  openapi-types:
    name: openapi-types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify OpenAPI generated types are up to date
        run: |
          pnpm openapi:check

  design-tokens:
    name: design-tokens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify generated token artifacts are up to date
        run: |
          pnpm --filter @fodmap/design-tokens tokens:check

      - name: Build design token artifacts
        run: |
          pnpm --filter @fodmap/design-tokens build

  ui-foundation:
    name: ui-foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify Tailwind shared style mapping is up to date
        run: |
          pnpm --filter @fodmap/tailwind-config styles:check

      - name: Build and validate UI package
        run: |
          pnpm --filter @fodmap/ui build
          pnpm --filter @fodmap/ui styles:check
          pnpm --filter @fodmap/ui typecheck
          pnpm --filter @fodmap/ui test

      - name: Typecheck Storybook sources
        run: |
          pnpm --filter @fodmap/storybook typecheck

      - name: Build Storybook
        run: |
          pnpm --filter @fodmap/storybook build

      - name: Install Chromium for Storybook tests
        run: |
          pnpm --filter @fodmap/storybook exec playwright install chromium

      - name: Run Storybook interaction and a11y tests
        run: |
          pnpm --filter @fodmap/storybook test:ci

  app-scaffold:
    name: app-scaffold
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Test, build, and typecheck app scaffold
        run: |
          pnpm --filter @fodmap/app test
          pnpm --filter @fodmap/app typecheck
          pnpm --filter @fodmap/app build

  content-scaffolds:
    name: content-scaffolds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build and typecheck marketing and research scaffolds
        run: |
          pnpm --filter @fodmap/marketing typecheck
          pnpm --filter @fodmap/marketing build
          pnpm --filter @fodmap/research typecheck
          pnpm --filter @fodmap/research build
