name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run quality gate
        run: |
          ./.github/scripts/quality-gate.sh

  eslint:
    name: eslint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build UI package for lint imports
        run: |
          pnpm --filter @fodmap/ui build

      - name: Run JavaScript lint
        run: |
          pnpm lint:ci

  python-lint:
    name: python-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Run Python lint checks
        run: |
          pnpm python:ci

  openapi-types:
    name: openapi-types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify OpenAPI generated types are up to date
        run: |
          pnpm turbo run openapi:check --filter=@fodmap/types

  design-tokens:
    name: design-tokens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify generated token artifacts are up to date
        run: |
          pnpm turbo run tokens:check --filter=@fodmap/design-tokens

      - name: Build design token artifacts
        run: |
          pnpm turbo run build --filter=@fodmap/design-tokens

  ui-foundation:
    name: ui-foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify Tailwind shared style mapping is up to date
        run: |
          pnpm turbo run styles:check --filter=@fodmap/tailwind-config

      - name: Build and validate UI package
        run: |
          pnpm turbo run build typecheck test --filter=@fodmap/ui

      - name: Verify UI style contract
        run: |
          pnpm turbo run styles:check --filter=@fodmap/ui

      - name: Typecheck Storybook sources
        run: |
          pnpm turbo run typecheck --filter=@fodmap/storybook

      - name: Build Storybook
        run: |
          pnpm turbo run storybook:build --filter=@fodmap/storybook

      - name: Install Chromium for Storybook tests
        run: |
          pnpm --filter @fodmap/storybook exec playwright install chromium

      - name: Run Storybook interaction and a11y tests
        run: |
          pnpm turbo run storybook:test --filter=@fodmap/storybook

  app-scaffold:
    name: app-scaffold
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Test, build, and typecheck app scaffold
        run: |
          pnpm turbo run test --filter=@fodmap/app
          pnpm turbo run typecheck --filter=@fodmap/app
          pnpm turbo run build --filter=@fodmap/app

  content-scaffolds:
    name: content-scaffolds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build and typecheck marketing and research scaffolds
        run: |
          pnpm turbo run typecheck build --filter=@fodmap/marketing --filter=@fodmap/research
