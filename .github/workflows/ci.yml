name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run quality gate
        run: |
          ./.github/scripts/quality-gate.sh

  eslint:
    name: eslint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build UI package for lint imports
        run: |
          pnpm --filter @fodmap/ui build

      - name: Run JavaScript lint
        run: |
          pnpm lint:ci

  python-lint:
    name: python-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.29.3

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Run Python lint checks
        run: |
          pnpm python:ci

  openapi-types:
    name: openapi-types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify OpenAPI generated types are up to date
        run: |
          pnpm --filter @fodmap/types openapi:check

  design-tokens:
    name: design-tokens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify generated token artifacts are up to date
        run: |
          pnpm turbo run tokens:check --filter=@fodmap/design-tokens

      - name: Build design token artifacts
        run: |
          pnpm turbo run build --filter=@fodmap/design-tokens

  ui-foundation:
    name: ui-foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify Tailwind shared style mapping is up to date
        run: |
          pnpm turbo run styles:check --filter=@fodmap/tailwind-config

      - name: Build and validate UI package
        run: |
          pnpm turbo run build typecheck test --filter=@fodmap/ui

      - name: Verify UI style contract
        run: |
          pnpm turbo run styles:check --filter=@fodmap/ui

      - name: Typecheck Storybook sources
        run: |
          pnpm turbo run typecheck --filter=@fodmap/storybook

      - name: Build Storybook
        run: |
          pnpm turbo run storybook:build --filter=@fodmap/storybook

      - name: Install Chromium for Storybook tests
        run: |
          pnpm --filter @fodmap/storybook exec playwright install chromium

      - name: Run Storybook interaction and a11y tests
        run: |
          pnpm turbo run storybook:test --filter=@fodmap/storybook

  app-scaffold:
    name: app-scaffold
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Test, build, and typecheck app scaffold
        run: |
          pnpm turbo run test --filter=@fodmap/app
          pnpm turbo run typecheck --filter=@fodmap/app
          pnpm turbo run build --filter=@fodmap/app

  content-scaffolds:
    name: content-scaffolds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build and typecheck marketing and research scaffolds
        run: |
          pnpm turbo run typecheck build --filter=@fodmap/marketing --filter=@fodmap/research

  ci-gate:
    name: CI
    if: ${{ always() }}
    needs:
      - quality
      - eslint
      - python-lint
      - openapi-types
      - design-tokens
      - ui-foundation
      - app-scaffold
      - content-scaffolds
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI workflow results
        run: |
          set -euo pipefail

          for result in \
            "${{ needs.quality.result }}" \
            "${{ needs.eslint.result }}" \
            "${{ needs.python-lint.result }}" \
            "${{ needs.openapi-types.result }}" \
            "${{ needs.design-tokens.result }}" \
            "${{ needs.ui-foundation.result }}" \
            "${{ needs.app-scaffold.result }}" \
            "${{ needs.content-scaffolds.result }}"; do
            if [ "$result" != "success" ]; then
              echo "::error::CI gate failed because a dependency result was '$result'."
              exit 1
            fi
          done

          echo "CI gate passed."
