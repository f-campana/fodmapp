name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run quality gate
        run: |
          ./.github/scripts/quality-gate.sh

  eslint:
    name: eslint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        id: setup
        uses: ./.github/actions/setup-js-workspace
        with:
          node-version: "22"
          pnpm-version: "10.29.3"
          install-command: "pnpm install --frozen-lockfile"
          enable-turbo-cache: "false"

      - name: Build UI package for lint imports
        run: |
          pnpm exec turbo run build --filter=@fodmap/ui

      - name: Run JavaScript lint
        run: |
          pnpm lint:ci

  python-lint:
    name: python-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.29.3

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Run Python lint checks
        run: |
          pnpm python:ci

  pr-scope:
    name: pr-scope
    runs-on: ubuntu-latest
    outputs:
      design_tokens: ${{ steps.scope.outputs.design_tokens }}
      ui_foundation: ${{ steps.scope.outputs.ui_foundation }}
      app_scaffold: ${{ steps.scope.outputs.app_scaffold }}
      content_scaffolds: ${{ steps.scope.outputs.content_scaffolds }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup workspace
        id: setup
        uses: ./.github/actions/setup-js-workspace
        with:
          node-version: "22"
          pnpm-version: "10.29.3"
          install-command: ""
          checkout-depth: "0"
          enable-turbo-cache: "false"

      - name: Detect CI scope
        id: scope
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node .github/scripts/detect-ci-scope.mjs

  openapi-types:
    name: openapi-types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        id: setup
        uses: ./.github/actions/setup-js-workspace
        with:
          node-version: "22"
          pnpm-version: "10.29.3"
          install-command: "pnpm install --frozen-lockfile"
          enable-turbo-cache: "false"

      - name: Verify OpenAPI generated types are up to date
        run: |
          pnpm --filter @fodmap/types openapi:check

  design-tokens:
    name: design-tokens
    needs:
      - pr-scope
    if: ${{ needs.pr-scope.outputs.design_tokens == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        id: setup
        uses: ./.github/actions/setup-js-workspace
        with:
          node-version: "22"
          pnpm-version: "10.29.3"
          install-command: "pnpm install --frozen-lockfile"
          turbo-team: ${{ secrets.TURBO_TEAM }}
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-cache-path: .turbo
          turbo-cache-key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}
          turbo-cache-restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Verify generated token artifacts are up to date
        run: |
          pnpm exec turbo run tokens:check --filter=@fodmap/design-tokens

      - name: Build design token artifacts
        run: |
          pnpm exec turbo run build --filter=@fodmap/design-tokens

      - name: Save Turbo local cache fallback
        if: ${{ always() && steps.setup.outputs.use_remote != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}

  ui-foundation:
    name: ui-foundation
    needs:
      - pr-scope
    if: ${{ needs.pr-scope.outputs.ui_foundation == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        id: setup
        uses: ./.github/actions/setup-js-workspace
        with:
          node-version: "22"
          pnpm-version: "10.29.3"
          install-command: "pnpm install --frozen-lockfile"
          turbo-team: ${{ secrets.TURBO_TEAM }}
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-cache-path: .turbo
          turbo-cache-key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}
          turbo-cache-restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Verify Tailwind shared style mapping is up to date
        run: |
          pnpm exec turbo run styles:check --filter=@fodmap/tailwind-config

      - name: Build and validate UI package
        run: |
          pnpm exec turbo run build typecheck test --filter=@fodmap/ui

      - name: Verify UI style contract
        run: |
          pnpm exec turbo run styles:check --filter=@fodmap/ui

      - name: Typecheck Storybook sources
        run: |
          pnpm exec turbo run typecheck --filter=@fodmap/storybook

      - name: Build Storybook
        run: |
          pnpm exec turbo run storybook:build --filter=@fodmap/storybook

      - name: Install Chromium for Storybook tests
        run: |
          pnpm --filter @fodmap/storybook exec playwright install chromium

      - name: Run Storybook interaction and a11y tests
        run: |
          pnpm exec turbo run storybook:test --filter=@fodmap/storybook

      - name: Save Turbo local cache fallback
        if: ${{ always() && steps.setup.outputs.use_remote != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}

  app-scaffold:
    name: app-scaffold
    needs:
      - pr-scope
    if: ${{ needs.pr-scope.outputs.app_scaffold == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        id: setup
        uses: ./.github/actions/setup-js-workspace
        with:
          node-version: "22"
          pnpm-version: "10.29.3"
          install-command: "pnpm install --frozen-lockfile"
          turbo-team: ${{ secrets.TURBO_TEAM }}
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-cache-path: .turbo
          turbo-cache-key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}
          turbo-cache-restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Test, build, and typecheck app scaffold
        run: |
          pnpm exec turbo run test --filter=@fodmap/app
          pnpm exec turbo run typecheck --filter=@fodmap/app
          pnpm exec turbo run build --filter=@fodmap/app

      - name: Save Turbo local cache fallback
        if: ${{ always() && steps.setup.outputs.use_remote != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}

  content-scaffolds:
    name: content-scaffolds
    needs:
      - pr-scope
    if: ${{ needs.pr-scope.outputs.content_scaffolds == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        id: setup
        uses: ./.github/actions/setup-js-workspace
        with:
          node-version: "22"
          pnpm-version: "10.29.3"
          install-command: "pnpm install --frozen-lockfile"
          turbo-team: ${{ secrets.TURBO_TEAM }}
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-cache-path: .turbo
          turbo-cache-key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}
          turbo-cache-restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Build and typecheck marketing and research scaffolds
        run: |
          pnpm exec turbo run typecheck build --filter=@fodmap/marketing --filter=@fodmap/research

      - name: Save Turbo local cache fallback
        if: ${{ always() && steps.setup.outputs.use_remote != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json') }}

  ci-gate:
    name: CI
    if: ${{ always() }}
    needs:
      - pr-scope
      - quality
      - eslint
      - python-lint
      - openapi-types
      - design-tokens
      - ui-foundation
      - app-scaffold
      - content-scaffolds
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI workflow results
        run: |
          set -euo pipefail

          for result in \
            "${{ needs.pr-scope.result }}" \
            "${{ needs.quality.result }}" \
            "${{ needs.eslint.result }}" \
            "${{ needs.python-lint.result }}" \
            "${{ needs.openapi-types.result }}"; do
            if [ "$result" != "success" ]; then
              echo "::error::CI gate failed because a required dependency result was '$result'."
              exit 1
            fi
          done

          for result in \
            "${{ needs.design-tokens.result }}" \
            "${{ needs.ui-foundation.result }}" \
            "${{ needs.app-scaffold.result }}" \
            "${{ needs.content-scaffolds.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::CI gate failed because a scoped dependency result was '$result'."
              exit 1
            fi
          done

          echo "CI gate passed."
