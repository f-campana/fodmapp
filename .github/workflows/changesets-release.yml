name: Changesets release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Version packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Preflight workflow permissions for release PR creation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          permissions_response="$(mktemp)"
          http_code="$(
            curl -sS -o "$permissions_response" -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/permissions/workflow"
          )"

          if [[ "$http_code" == "403" ]]; then
            echo "::warning::Unable to verify Actions workflow permissions via API (HTTP 403) with GITHUB_TOKEN."
            echo "::warning::Continuing to release step. If PR creation fails, verify:"
            echo "::warning::Settings > Actions > General > Workflow permissions."
            exit 0
          fi

          if [[ "$http_code" != "200" ]]; then
            echo "::error::Failed to inspect workflow permissions (HTTP ${http_code})."
            cat "$permissions_response"
            exit 1
          fi

          permissions_json="$(cat "$permissions_response")"

          PERMISSIONS_JSON="$permissions_json" node <<'NODE'
          const payload = JSON.parse(process.env.PERMISSIONS_JSON || "{}");
          const defaultPerm = payload.default_workflow_permissions;
          const canApprove = payload.can_approve_pull_request_reviews;

          if (defaultPerm !== "read" && defaultPerm !== "write") {
            console.error("::error::Changesets release requires workflow permissions set to either 'Read repository contents' or 'Read and write'.");
            console.error("::error::GitHub UI: Settings > Actions > General > Workflow permissions.");
            process.exit(1);
          }

          if (canApprove !== true) {
            console.error("::error::Changesets release requires 'Allow GitHub Actions to create and approve pull requests'.");
            console.error("::error::GitHub UI: Settings > Actions > General > Workflow permissions.");
            process.exit(1);
          }

          console.log("Workflow permission preflight passed for release PR creation.");
          NODE

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Create release pull request
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          createGithubReleases: false
